<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <!-- PWA meta tags — required for iOS standalone mode -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Thailand Food">
  <meta name="theme-color" content="#0E0E0E">

  <title>Thailand Food Guide</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-180.png">

  <!-- Google Fonts: Playfair Display, DM Sans, Noto Sans Thai -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=Noto+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Leaflet CSS -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <!-- App styles -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- App shell — full-screen fixed container -->
  <div class="app-shell" id="app">

    <!-- Main content area — fills between filter bar and nav -->
    <main class="app-content" id="app-content">

      <!-- LIST VIEW -->
      <div class="view"
           id="view-list"
           role="main"
           aria-label="Restaurant list"
           aria-hidden="true">

        <!-- Filter bar — sticky within the list view scroll container -->
        <div class="filter-bar" id="filter-bar">
          <div class="filter-chips"
               id="filter-chips"
               role="group"
               aria-label="Filters">
          </div>
        </div>

        <div class="view__content">

          <!-- Skeleton cards shown while loading -->
          <div class="card-list" id="skeleton-list" aria-hidden="true">
            <div class="skeleton-card">
              <div class="skeleton-card__photo skeleton"></div>
              <div class="skeleton-card__line skeleton"></div>
              <div class="skeleton-card__line--short skeleton"></div>
            </div>
            <div class="skeleton-card">
              <div class="skeleton-card__photo skeleton"></div>
              <div class="skeleton-card__line skeleton"></div>
              <div class="skeleton-card__line--short skeleton"></div>
            </div>
            <div class="skeleton-card">
              <div class="skeleton-card__photo skeleton"></div>
              <div class="skeleton-card__line skeleton"></div>
              <div class="skeleton-card__line--short skeleton"></div>
            </div>
          </div>

          <!-- Restaurant cards injected by JS -->
          <div class="card-list"
               id="card-list"
               role="list"
               aria-live="polite"
               aria-label="Restaurants"
               hidden>
          </div>

          <!-- Empty state -->
          <div class="empty-state" id="empty-state" hidden>
            <svg class="empty-state__icon"
                 aria-hidden="true"
                 viewBox="0 0 24 24"
                 fill="none"
                 stroke="currentColor"
                 stroke-width="1.5">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <p class="empty-state__title">No restaurants found</p>
            <p class="empty-state__message">Try adjusting your filters or switch to a different city.</p>
          </div>

        </div>
      </div>

      <!-- MAP VIEW (default active) -->
      <div class="view view--active"
           id="view-map"
           role="main"
           aria-label="Restaurant map">
        <div class="map-container" id="map"></div>
      </div>

      <!-- DETAIL VIEW — slides over map/list -->
      <div class="view-detail"
           id="view-detail"
           role="main"
           aria-label="Restaurant detail"
           aria-hidden="true">
        <div class="view-detail__header">
          <button class="view-detail__back" id="detail-back" aria-label="Go back">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <h1 class="view-detail__title" id="detail-title"></h1>
        </div>
        <div class="view-detail__body" id="detail-body">
          <!-- Content injected by detail.js -->
        </div>
      </div>

    </main>

    <!-- Bottom navigation -->
    <nav class="nav-bar"
         id="nav-bar"
         role="navigation"
         aria-label="Main navigation">

      <button class="nav-item"
              id="nav-list"
              data-view="list"
              aria-label="List view"
              aria-pressed="false">
        <svg class="nav-item__icon"
             aria-hidden="true"
             viewBox="0 0 24 24"
             fill="none"
             stroke="currentColor"
             stroke-width="2"
             stroke-linecap="round"
             stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"/>
          <line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/>
          <line x1="3" y1="12" x2="3.01" y2="12"/>
          <line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
        <span class="nav-item__label">List</span>
      </button>

      <button class="nav-item nav-item--active"
              id="nav-map"
              data-view="map"
              aria-label="Map view"
              aria-pressed="true">
        <svg class="nav-item__icon"
             aria-hidden="true"
             viewBox="0 0 24 24"
             fill="none"
             stroke="currentColor"
             stroke-width="2"
             stroke-linecap="round"
             stroke-linejoin="round">
          <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/>
          <line x1="9" y1="3" x2="9" y2="18"/>
          <line x1="15" y1="6" x2="15" y2="21"/>
        </svg>
        <span class="nav-item__label">Map</span>
      </button>

    </nav>

  </div><!-- /.app-shell -->

  <!-- Navigation choice sheet overlay -->
  <div class="nav-choice-overlay" id="nav-choice-overlay">
    <div class="nav-choice-sheet" id="nav-choice-sheet"></div>
  </div>

  <!-- Sort sheet overlay -->
  <div class="sort-sheet-overlay" id="sort-sheet-overlay">
    <div class="sort-sheet" id="sort-sheet"></div>
  </div>

  <!-- Toast notifications -->
  <div class="toast-container"
       id="toast-container"
       aria-live="polite"
       aria-atomic="true"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Supabase JS client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- App — ES modules -->
  <script type="module" src="app.js"></script>

  <!-- Service worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(console.error);
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Food Guide">
  <meta name="theme-color" content="#111111">
  <meta name="format-detection" content="telephone=no">
  <link rel="apple-touch-icon" href="/icon-180.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500;600&family=Noto+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="/styles.css">
  <title>Food Guide</title>
</head>
<body>
  <div class="app" id="app">

    <!-- Top Navigation -->
    <nav class="nav-top" role="banner">
      <div class="nav-top__inner">
        <div>
          <div class="nav-top__title">Food Guide</div>
          <div class="nav-top__subtitle" id="nav-subtitle">Loading…</div>
        </div>
      </div>
    </nav>

    <!-- Search Bar -->
    <div class="search-wrap">
      <div class="search-bar">
        <svg class="search-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          class="search-bar__input"
          type="search"
          id="search-input"
          placeholder="Search restaurants or dishes…"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          aria-label="Search restaurants">
      </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar scroll-x" id="filter-bar" role="group" aria-label="Filters"></div>

    <!-- Main scroll area -->
    <main class="main-scroll" id="main-scroll">
      <div class="card-list" id="card-list" role="list"></div>
      <div id="map-view" class="map-container" aria-label="Map view"></div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="nav-bottom" role="navigation" aria-label="Main navigation">
      <button class="nav-item nav-item--active" data-tab="list" aria-label="Restaurants list" aria-current="page">
        <svg class="nav-item__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
          <circle cx="3" cy="6" r="1" fill="currentColor"/><circle cx="3" cy="12" r="1" fill="currentColor"/><circle cx="3" cy="18" r="1" fill="currentColor"/>
        </svg>
        <span class="nav-item__label">Restaurants</span>
      </button>
      <button class="nav-item" data-tab="map" aria-label="Map view">
        <svg class="nav-item__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
          <line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/>
        </svg>
        <span class="nav-item__label">Map</span>
      </button>
      <button class="nav-item" data-tab="personal" aria-label="My list">
        <svg class="nav-item__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
        <span class="nav-item__label">My List</span>
      </button>
    </nav>

  </div><!-- /.app -->

  <!-- Bottom Sheet -->
  <div class="sheet-backdrop" id="sheet-backdrop" aria-hidden="true"></div>
  <div class="bottom-sheet" id="bottom-sheet" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="bottom-sheet__handle" aria-hidden="true"></div>
    <div class="bottom-sheet__header" id="sheet-title"></div>
    <div class="bottom-sheet__body" id="sheet-body"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/app.js" defer></script>
</body>
</html>

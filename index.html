<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <!-- PWA meta tags — required for iOS standalone mode -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Thailand Food">
  <meta name="theme-color" content="#0E0E0E">

  <title>Thailand Food Guide</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-180.png">

  <!-- Google Fonts: Playfair Display, DM Sans, Noto Sans Thai -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=Noto+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Leaflet CSS -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="">

  <!-- App styles -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- App shell — full-screen fixed container -->
  <div class="app-shell" id="app">

    <!-- Main content area — fills between filter bar and nav -->
    <main class="app-content" id="app-content">

      <!-- LIST VIEW (default active) -->
      <div class="view view--active"
           id="view-list"
           role="main"
           aria-label="Restaurant list">

        <!-- Filter bar — sticky within the list view scroll container -->
        <div class="filter-bar" id="filter-bar">
          <div class="filter-chips"
               id="filter-chips"
               role="group"
               aria-label="Filters">
            <!-- Filter chips injected by JS -->
          </div>
        </div>

        <div class="view__content">

          <!-- Skeleton cards shown while loading -->
          <div class="card-list" id="skeleton-list" aria-hidden="true">
            <div class="skeleton-card">
              <div class="skeleton-card__photo skeleton"></div>
              <div class="skeleton-card__line skeleton"></div>
              <div class="skeleton-card__line--short skeleton"></div>
            </div>
            <div class="skeleton-card">
              <div class="skeleton-card__photo skeleton"></div>
              <div class="skeleton-card__line skeleton"></div>
              <div class="skeleton-card__line--short skeleton"></div>
            </div>
            <div class="skeleton-card">
              <div class="skeleton-card__photo skeleton"></div>
              <div class="skeleton-card__line skeleton"></div>
              <div class="skeleton-card__line--short skeleton"></div>
            </div>
          </div>

          <!-- Restaurant cards injected by JS -->
          <div class="card-list"
               id="card-list"
               role="list"
               aria-live="polite"
               aria-label="Restaurants"
               hidden>
          </div>

          <!-- Empty state — shown when filters return zero results -->
          <div class="empty-state" id="empty-state" hidden>
            <svg class="empty-state__icon"
                 aria-hidden="true"
                 viewBox="0 0 24 24"
                 fill="none"
                 stroke="currentColor"
                 stroke-width="1.5">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <p class="empty-state__title">No restaurants found</p>
            <p class="empty-state__message">Try adjusting your filters or switch to a different city.</p>
          </div>

        </div>
      </div>

      <!-- MAP VIEW -->
      <div class="view"
           id="view-map"
           role="main"
           aria-label="Restaurant map"
           aria-hidden="true">
        <div class="map-container" id="map"></div>
      </div>

    </main>

    <!-- Bottom navigation — position:fixed per STEP_15, never sticky -->
    <nav class="nav-bar"
         id="nav-bar"
         role="navigation"
         aria-label="Main navigation">

      <button class="nav-item nav-item--active"
              id="nav-list"
              data-view="list"
              aria-label="List view"
              aria-pressed="true">
        <svg class="nav-item__icon"
             aria-hidden="true"
             viewBox="0 0 24 24"
             fill="none"
             stroke="currentColor"
             stroke-width="2"
             stroke-linecap="round"
             stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"/>
          <line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/>
          <line x1="3" y1="12" x2="3.01" y2="12"/>
          <line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
        <span class="nav-item__label">List</span>
      </button>

      <button class="nav-item"
              id="nav-map"
              data-view="map"
              aria-label="Map view"
              aria-pressed="false">
        <svg class="nav-item__icon"
             aria-hidden="true"
             viewBox="0 0 24 24"
             fill="none"
             stroke="currentColor"
             stroke-width="2"
             stroke-linecap="round"
             stroke-linejoin="round">
          <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/>
          <line x1="9" y1="3" x2="9" y2="18"/>
          <line x1="15" y1="6" x2="15" y2="21"/>
        </svg>
        <span class="nav-item__label">Map</span>
      </button>

    </nav>

  </div><!-- /.app-shell -->

  <!-- Bottom sheet — outside app-shell for correct z-index stacking -->
  <div class="bottom-sheet-backdrop"
       id="sheet-backdrop"
       aria-hidden="true"></div>

  <div class="bottom-sheet"
       id="bottom-sheet"
       role="dialog"
       aria-modal="true"
       aria-label="Restaurant detail"
       aria-hidden="true">
    <div class="bottom-sheet__handle">
      <div class="bottom-sheet__drag-handle" aria-hidden="true"></div>
    </div>
    <div class="bottom-sheet__content" id="sheet-content">
      <!-- Content injected by JS when a card is tapped -->
    </div>
  </div>

  <!-- Toast notifications -->
  <div class="toast-container"
       id="toast-container"
       aria-live="polite"
       aria-atomic="true"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN/WLEg="
          crossorigin=""></script>

  <!-- Supabase JS client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- App -->
  <script src="app.js" defer></script>

  <!-- Service worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(console.error);
    }
  </script>

</body>
</html>
